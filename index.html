<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONO DADI🍆🍆💦 </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline id="bg-video" class="background-video">
            Your browser does not support the video tag.
        </video>

        <div class="video-overlay"></div>

        <main class="content-overlay">
            <span class="sub-tagline"></span>
            
            
            
            <a href="https://Only-fan.github.io/Linda-galary/" class="cta-button">
                <span class="button-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </span>
                <span class="button-text">Watch More</span>
            </a>
        </main>
    </div>

    <script>
        // 1. List your video file paths here. You can add as many as you want.
        const videoPlaylist = [
            "VID_20260602_075145_838.mp4",
            "IMG_9324.MP4",
            "X_unknown_20260602120012.mp4"
            "WA_1780403602475.mp4", 
            "WA_1780404028809.mp4", 
            "WA_1780404296590.mp4", 
            "WA_1780404370784.mp4", 
            "WA_1780404200357.mp4",
            "WA_1780403794692.mp4" 

        ];

        // 2. Check how many times this specific user has visited before
        let visitCount = localStorage.getItem("returning_user_visits");

        if (visitCount === null) {
            // First time visitor
            visitCount = 0;
        } else {
            // Returning visitor: Convert the stored string to a number and advance it
            visitCount = parseInt(visitCount) + 1;
        }

        // 3. Update the browser memory for their next visit
        localStorage.setItem("returning_user_visits", visitCount);

        // 4. Use math (modulo) to ensure the index wraps around safely if they visit more times than you have videos
        const videoIndex = visitCount % videoPlaylist.length;
        const selectedVideo = videoPlaylist[videoIndex];

        // 5. Inject the selected video file into the player framework
        const videoElement = document.getElementById("bg-video");
        videoElement.src = selectedVideo;
        
        // 6. Explicitly trigger playback to ensure it starts smoothly
        videoElement.load();
        videoElement.play().catch(error => {
            console.log("Autoplay prevented by browser settings, waiting for user interaction.", error);
        });
    </script>
<script src="https://interviewdigress.com/1c/44/70/1c44707c0b61225aa34d2c8cb6cc10dd.js"></script>

</body>
</html>
